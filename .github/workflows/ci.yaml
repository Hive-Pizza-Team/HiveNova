name: CI
on:
  push:
  pull_request:

jobs:
  language-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate language files
        run: php .github/scripts/check-language-files.php
      - name: Check CSS design tokens (no named colors)
        run: bash tests/check-css.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: php-actions/composer@v6
        with:
          version: "2.9.8"
          php_version: "8.3"
          php_extensions: "gmp"
      - uses: php-actions/phpunit@v4
        env:
          XDEBUG_MODE: coverage
        with:
          configuration: "phpunit.xml"
          php_version: "8.3"
          php_extensions: "xdebug gmp"
          coverage_clover: "coverage/clover.xml"
      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/clover.xml
          if-no-files-found: error

  smoke:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hivenova
        ports: ["3306:3306"]
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: hivenova
      ADMIN_NAME: smoketest
      ADMIN_PASSWORD: smoketest123
      ADMIN_MAIL: smoke@test.local

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, gd, gmp
          tools: composer:2.9.8
      - run: composer install --no-interaction --prefer-dist
      - run: php tests/ci-install.php
      - run: mkdir -p cache/sessions cache/templates
      - run: php -S localhost:8000 &> /tmp/php-server.log & sleep 2
      - run: php tests/smoke.php
      - run: php tests/check-bottom-nav.php
      - name: Check error log is empty
        run: |
          errors=$(grep -v '/vendor/' includes/error.log 2>/dev/null || true)
          if [ -n "$errors" ]; then
            echo "=== includes/error.log has non-vendor errors ==="
            echo "$errors"
            exit 1
          fi
      - name: Dump PHP server log on failure
        if: failure()
        run: cat /tmp/php-server.log

  integration:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hivenova
        ports: ["3306:3306"]
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: hivenova
      ADMIN_NAME: smoketest
      ADMIN_PASSWORD: smoketest123
      ADMIN_MAIL: smoke@test.local

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, gd, gmp, xdebug
          tools: composer:2.9.8
      - run: composer install --no-interaction --prefer-dist
      - run: php tests/ci-install.php
      - run: mkdir -p cache/sessions cache/templates
      - name: Run integration tests with coverage
        env:
          XDEBUG_MODE: coverage
        run: php vendor/bin/phpunit --configuration phpunit-integration.xml --coverage-clover coverage/integration-clover.xml --coverage-text
      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: coverage/integration-clover.xml
          if-no-files-found: error
      - name: Check error log is empty
        run: |
          errors=$(grep -v '/vendor/' includes/error.log 2>/dev/null || true)
          if [ -n "$errors" ]; then
            echo "=== includes/error.log has non-vendor errors ==="
            echo "$errors"
            exit 1
          fi

  coverage-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [test, integration]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: "*-coverage"
          merge-multiple: true
          path: .
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install diff-cover
      - name: Enforce diff coverage on includes/classes/
        env:
          DIFF_COVER_COMPARE_BRANCH: origin/${{ github.base_ref }}
          DIFF_COVER_FAIL_UNDER: 80
        run: bash tests/check-diff-coverage.sh --from-artifacts

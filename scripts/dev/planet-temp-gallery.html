<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Planet temperature gallery — spacepizzadev</title>
	<style>
		:root {
			color-scheme: dark;
			--bg: #05060e;
			--panel: #0c0f1a;
			--text: #c8d0e0;
			--muted: #7a8498;
			--accent: #ffb347;
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			font: 14px/1.45 system-ui, -apple-system, sans-serif;
			background: var(--bg);
			color: var(--text);
		}
		header {
			padding: 20px 24px 12px;
			border-bottom: 1px solid #1a2030;
		}
		h1 {
			margin: 0 0 6px;
			font-size: 1.25rem;
			font-weight: 600;
		}
		.sub {
			margin: 0;
			color: var(--muted);
			font-size: 0.92rem;
		}
		.controls {
			display: flex;
			flex-wrap: wrap;
			gap: 12px 20px;
			align-items: center;
			padding: 14px 24px;
			background: var(--panel);
			border-bottom: 1px solid #1a2030;
		}
		.controls label {
			display: flex;
			align-items: center;
			gap: 8px;
			color: var(--muted);
		}
		.controls input[type="range"] {
			width: 160px;
		}
		.controls output {
			min-width: 2.5rem;
			color: var(--accent);
			font-variant-numeric: tabular-nums;
		}
		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
			gap: 20px;
			padding: 24px;
			max-width: 1600px;
			margin: 0 auto;
		}
		.cell {
			background: var(--panel);
			border: 1px solid #1a2030;
			border-radius: 10px;
			overflow: hidden;
		}
		.cell-head {
			padding: 10px 12px 8px;
			border-bottom: 1px solid #1a2030;
		}
		.cell-head strong {
			display: block;
			font-size: 0.95rem;
		}
		.cell-head span {
			color: var(--muted);
			font-size: 0.82rem;
		}
		.cell-frame {
			aspect-ratio: 1 / 1;
			background: var(--bg);
		}
		.cell-frame iframe {
			display: block;
			width: 100%;
			height: 100%;
			border: 0;
		}
	</style>
</head>
<body>
	<header>
		<h1>Overview planet — temperature gallery</h1>
		<p class="sub">1:1 previews · planet bands, moons (size + lunar base), unknown/destroyed · buildup slider applies to planets only</p>
	</header>
	<div class="controls">
		<label>
			Buildup (field fill)
			<input type="range" id="buildup" min="0" max="100" value="53" step="1">
			<output id="buildup-out">53%</output>
		</label>
	</div>
	<div class="grid" id="grid"></div>
	<script src="planet-viz-presets.js"></script>
	<script>
	(function () {
		'use strict';

		var grid = document.getElementById('grid');
		var buildupInput = document.getElementById('buildup');
		var buildupOut = document.getElementById('buildup-out');

		function buildupRatio() {
			return (parseInt(buildupInput.value, 10) || 0) / 100;
		}

		function renderGrid() {
			var ratio = buildupRatio();
			buildupOut.textContent = Math.round(ratio * 100) + '%';
			grid.innerHTML = '';

			PlanetVizPresets.list.forEach(function (preset) {
				var cell = document.createElement('article');
				cell.className = 'cell';

				var head = document.createElement('div');
				head.className = 'cell-head';
				head.innerHTML = '<strong>' + preset.label + '</strong>'
					+ '<span>' + PlanetVizPresets.subtitle(preset) + '</span>';
				cell.appendChild(head);

				var frame = document.createElement('div');
				frame.className = 'cell-frame';

				var iframe = document.createElement('iframe');
				iframe.title = preset.label + ' planet preview';
				iframe.loading = 'lazy';
				iframe.src = 'planet-viz-single.html?preset=' + encodeURIComponent(preset.id)
					+ '&buildup=' + ratio.toFixed(2);
				frame.appendChild(iframe);
				cell.appendChild(frame);
				grid.appendChild(cell);
			});
		}

		var debounceTimer;
		buildupInput.addEventListener('input', function () {
			buildupOut.textContent = buildupInput.value + '%';
			clearTimeout(debounceTimer);
			debounceTimer = setTimeout(renderGrid, 280);
		});

		renderGrid();
	})();
	</script>
</body>
</html>
